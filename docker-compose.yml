services:
  backend:
    image: ghcr.io/husainf4l/pozz-backend:0.1.7
    ports:
      - "3400:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

  pozz-app:
    image: ghcr.io/husainf4l/pozz-app:0.1.7
    ports:
      - "3401:80"
    restart: unless-stopped

  pozz-public:
    image: ghcr.io/husainf4l/pozz-public:0.1.7
    ports:
      - "3402:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  poss-admin:
    image: ghcr.io/husainf4l/poss-admin:0.1.7
    ports:
      - "3403:80"
    restart: unless-stopped
