services:
  backend:
    image: ghcr.io/husainf4l/pozz-backend:0.1.5
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

  pozz-app:
    image: ghcr.io/husainf4l/pozz-app:0.1.5
    ports:
      - "4201:80"
    restart: unless-stopped

  pozz-public:
    image: ghcr.io/husainf4l/pozz-public:0.1.5
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  poss-admin:
    image: ghcr.io/husainf4l/poss-admin:0.1.5
    ports:
      - "4202:80"
    restart: unless-stopped
